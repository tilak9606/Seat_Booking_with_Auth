<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center p-12 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-12 border border-slate-700/50">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 mb-2">
          Create Account
        </h1>
        <p class="text-slate-400 text-base">Join ChaiCode Cinema</p>
      </div>

      <form id="signup-form" class="space-y-6">
        <div>
          <label class="block text-base font-medium text-slate-300 mb-4">Full Name</label>
          <input 
            type="text" 
            id="name" 
            required
            class="w-full px-6 py-4 rounded-xl bg-slate-900/50 border text-base border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="John Doe"
          />
        </div>

        <div>
          <label class="block text-base font-medium text-slate-300 mb-4">Email</label>
          <input 
            type="email" 
            id="email" 
            required
            class="w-full px-6 py-4 rounded-xl bg-slate-900/50 border text-base border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="abc@example.com"
          />
        </div>

        <div>
          <label class="block text-base font-medium text-slate-300 mb-4">Password</label>
          <input 
            type="password" 
            id="password" 
            required
            class="w-full px-6 py-4 rounded-xl bg-slate-900/50 text-base border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            placeholder="••••••••"
          />
        </div>

        <button 
          type="submit"
          class="w-full py-3 rounded-xl font-semibold text-lg text-white bg-gradient-to-r from-blue-500 to-purple-500 hover:from-blue-400 hover:to-purple-400 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_10px_25px_rgba(59,130,246,0.4)] active:scale-95"
        >
          Sign Up
        </button>
      </form>

      <p class="mt-6 text-center text-base text-slate-400">
        Already have an account? 
        <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Login</a>
      </p>
      
      <a href="/" class="mt-4 block text-sm text-center text-slate-500 hover:text-slate-300 transition-colors">
        ← Back to Home
      </a>
    </div>

   <script>
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      
      const data = await res.json();
      
      if (data.error) {
        alert('Registration failed: ' + data.error);
      } else {
        alert('Registration successful! Please verify your email before logging in.');
        window.location.href = 'Login.html';
      }
    } catch (err) {
      alert('Error: ' + err);
    }
  });
</script>
</body>
</html>
