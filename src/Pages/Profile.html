<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>

  <body class="min-h-screen p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <nav class="max-w-7xl mx-auto mb-8 flex justify-between items-center">
      <a href="/" class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
        ChaiCode Cinema
      </a>
      <div class="flex items-center gap-4">
        <span id="user-name" class="text-slate-300 text-sm"></span>
        <button id="logout-btn" class="px-6 py-2 rounded-xl bg-rose-500/20 text-rose-400 border border-rose-500/50 hover:bg-rose-500/30 transition-all text-sm">
          Logout
        </button>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto">
      <div class="bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-slate-700/50 mb-8">
        <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4">
          My Profile
        </h1>
        <div id="user-info" class="space-y-2 text-slate-300 text-sm">
          <p>Loading...</p>
        </div>
      </div>

      <div class="bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-slate-700/50">
        <h2 class="text-xl font-bold text-white mb-6">My Booked Seats</h2>
        <div id="booked-seats" class="grid grid-cols-4 gap-4">
          <p class="text-slate-400 col-span-4 text-sm">Loading seats...</p>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      
      if (!token || !userStr) {
        alert('Please login first!');
        wondow.location.href = 'Login.html';
      }
      
      const user = JSON.parse(userStr);
      
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-info').innerHTML = `
        <p><span class="text-slate-400">Name:</span> ${user.name}</p>
        <p><span class="text-slate-400">Email:</span> ${user.email}</p>
      `;
      
      document.getElementById('logout-btn').addEventListener('click', async () => {
        try {
          await fetch('/auth/logout', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
          });
        } catch (e) {
          console.error('Logout error:', e);
        }
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/';
      });
      
      async function loadBookedSeats() {
        try {
          const res = await fetch(`/seats/my-bookings`, {
            headers: { 'Authorization': `Bearer ${token}` }

          });
          
          const data = await res.json();
          const seatsContainer = document.getElementById('booked-seats');
           const seats = Array.isArray(data) ? data : [data];
           if (seats.length === 0) {
            seatsContainer.innerHTML = '<p class="text-slate-400 text-sm">No booked seats</p>';
            return;
        }
        
        seatsContainer.innerHTML = seats.map(seat => `
            <div class="bg-emerald-500/20 border border-emerald-500/50 rounded-xl p-4 text-center">
                <span class="text-lg font-bold text-emerald-400">${seat.name}</span>
                <p class="text-xs text-slate-400 mt-1">Booked</p>
            </div>
        `).join('');
        } catch (err) {
            console.log('Error fetching seats:', err);
          document.getElementById('booked-seats').innerHTML = 
            `<p class="text-rose-400 col-span-4 text-sm">Error loading seats</p>`;
        }
      }
      
      loadBookedSeats();
    </script>
  </body>
</html>
