<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center p-12 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-12 border border-slate-700/50"
    >
      <div class="text-center mb-8">
        <h1
          class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2"
        >
          Welcome Back
        </h1>
        <p class="text-slate-400 text-base">Login to book your seats</p>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-base font-medium text-slate-300 mb-4"
            >Email</label
          >
          <input
            type="email"
            id="email"
            required
            class="w-full px-6 py-4 rounded-xl bg-slate-900/50 border text-base border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all"
            placeholder="abc@example.com"
          />
        </div>

        <div>
          <label class="block text-base font-medium text-slate-300 mb-4"
            >Password</label
          >
          <input
            type="password"
            id="password"
            required
            class="w-full px-6 py-4 rounded-xl bg-slate-900/50 text-base border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition-all"
            placeholder="••••••••"
          />
        </div>
<div class="flex items-center justify-between mt-4">
    <label class="flex items-center text-sm text-slate-400">
        <input type="checkbox" class="mr-2 rounded bg-slate-800 border-slate-600" />
        Remember me
    </label>
    <a href="/forgot-password" class="text-sm text-emerald-400 hover:text-emerald-300">
        Forgot password?
    </a>
</div>
        <button
          type="submit"
          class="w-full py-3 rounded-xl font-semibold text-lg text-white bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.4)] active:scale-95"
        >
          Login
        </button>
      </form>

      <p class="mt-6 text-center text-base text-slate-400">
        Don't have an account?
        <a
          href="/signup"
          class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors"
          >Sign up</a
        >
      </p>

      <a
        href="/"
        class="mt-4 block text-sm text-center text-slate-500 hover:text-slate-300 transition-colors"
      >
        ← Back to Home
      </a>
    </div>

    <script>
      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          try {
            const res = await fetch("/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (data.error) {
              alert(data.error);
            } else {
              // Store both token and user info
              localStorage.setItem("token", data.data.refreshToken);
              localStorage.setItem("user", JSON.stringify(data.data.user));
              alert("Login successful!");
              window.location.href = "index.html";
            }
          } catch (err) {
            alert("Login failed: " + err);
          }
        });
    </script>
  </body>
</html>
