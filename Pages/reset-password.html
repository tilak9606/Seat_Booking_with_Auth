<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .input-field {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      }

      .btn-primary {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .password-strength {
        height: 6px;
        border-radius: 3px;
        transition: all 0.3s ease;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div class="w-full max-w-2xl">
      <!-- Logo/Header -->
      <div class="text-center mb-12">
        <div
          class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-emerald-500/20 border border-emerald-500/30 mb-6"
        >
          <svg
            class="w-10 h-10 text-emerald-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
            />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-4">Reset Password</h1>
        <p class="text-slate-400 text-lg">Create a new secure password for your account</p>
      </div>

      <!-- Token Error (if no token) -->
      <div
        id="tokenError"
        class="hidden glass-panel rounded-3xl p-12 shadow-2xl text-center"
      >
        <div
          class="w-20 h-20 rounded-full bg-rose-500/20 flex items-center justify-center mx-auto mb-6"
        >
          <svg
            class="w-10 h-10 text-rose-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4m0 4h.01M12 2a10 10 0 100 20 10 10 0 000-20z"
            />
          </svg>
        </div>
        <h3 class="text-2xl font-semibold text-white mb-4">
          Invalid Reset Link
        </h3>
        <p class="text-slate-400 text-lg mb-8">
          This password reset link is invalid or has expired.
        </p>
        <a
          onclick="window.location.origin='src/pages/forgot-password.html'"
          class="btn-primary inline-block px-10 py-4 rounded-2xl text-lg font-semibold text-white"
        >
          Request New Link
        </a>
      </div>

      <!-- Form -->
      <div
        id="resetFormContainer"
        class="glass-panel rounded-3xl p-12 shadow-2xl"
      >
        <form id="resetForm" class="space-y-8">
          <!-- New Password -->
          <div>
            <label class="block text-lg font-medium text-slate-300 mb-4"
              >New Password</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none"
              >
                <svg
                  class="w-6 h-6 text-slate-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  />
                </svg>
              </div>
              <input
                type="password"
                id="password"
                name="password"
                required
                minlength="6"
                class="input-field w-full pl-16 pr-16 py-4 rounded-2xl text-lg text-white placeholder-slate-500"
                placeholder="Enter new password"
              />
              <button
                type="button"
                id="togglePassword"
                class="absolute inset-y-0 right-0 pr-6 flex items-center text-slate-500 hover:text-slate-300"
              >
                <svg
                  id="eyeIcon"
                  class="w-6 h-6"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
            <!-- Password Strength -->
            <div class="mt-4 flex gap-2">
              <div
                id="strength1"
                class="password-strength flex-1 bg-slate-700"
              ></div>
              <div
                id="strength2"
                class="password-strength flex-1 bg-slate-700"
              ></div>
              <div
                id="strength3"
                class="password-strength flex-1 bg-slate-700"
              ></div>
              <div
                id="strength4"
                class="password-strength flex-1 bg-slate-700"
              ></div>
            </div>
            <p id="strengthText" class="text-sm text-slate-500 mt-3">
              Enter at least 6 characters
            </p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-lg font-medium text-slate-300 mb-4"
              >Confirm Password</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-6 flex items-center pointer-events-none"
              >
                <svg
                  class="w-6 h-6 text-slate-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                  />
                </svg>
              </div>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
                class="input-field w-full pl-16 pr-6 py-4 rounded-2xl text-lg text-white placeholder-slate-500"
                placeholder="Confirm new password"
              />
            </div>
            <p id="matchError" class="text-sm text-rose-400 mt-3 hidden">
              Passwords do not match
            </p>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="btn-primary w-full py-4 rounded-2xl text-lg font-semibold text-white flex items-center justify-center gap-4"
          >
            <span id="btnText">Reset Password</span>
            <svg
              id="btnIcon"
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
            <svg
              id="loadingIcon"
              class="w-6 h-6 animate-spin hidden"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </button>
        </form>

        <!-- Success Message -->
        <div id="successMessage" class="hidden text-center py-12">
          <div
            class="w-20 h-20 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-6"
          >
            <svg
              class="w-10 h-10 text-emerald-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
          </div>
          <h3 class="text-2xl font-semibold text-white mb-4">Password Reset!</h3>
          <p class="text-slate-400 text-lg mb-8">
            Your password has been changed successfully.
          </p>
          <a
            href="/login"
            class="btn-primary inline-block px-10 py-4 rounded-2xl text-lg font-semibold text-white"
          >
            Sign In Now
          </a>
        </div>

        <!-- Error Message -->
        <div
          id="errorMessage"
          class="hidden mt-6 p-6 rounded-2xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-base"
        ></div>
      </div>
    </div>

    <script>
      // Get token from URL path /reset-password/TOKEN
      const token = window.location.pathname.split("/").pop();

      const resetFormContainer = document.getElementById("resetFormContainer");
      const tokenError = document.getElementById("tokenError");
      const form = document.getElementById("resetForm");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnIcon = document.getElementById("btnIcon");
      const loadingIcon = document.getElementById("loadingIcon");
      const successMessage = document.getElementById("successMessage");
      const errorMessage = document.getElementById("errorMessage");

      // Check if token exists
      if (!token || token === "reset-password.html" || token === "reset-password") {
        resetFormContainer.classList.add("hidden");
        tokenError.classList.remove("hidden");
      }

      // Password toggle
      document
        .getElementById("togglePassword")
        .addEventListener("click", () => {
          const password = document.getElementById("password");
          password.type = password.type === "password" ? "text" : "password";
        });

      // Password strength checker
      document.getElementById("password").addEventListener("input", (e) => {
        const val = e.target.value;
        const strengths = [
          document.getElementById("strength1"),
          document.getElementById("strength2"),
          document.getElementById("strength3"),
          document.getElementById("strength4"),
        ];
        const strengthText = document.getElementById("strengthText");

        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9!@#$%^&*]/.test(val)) score++;

        const colors = [
          "bg-slate-700",
          "bg-rose-500",
          "bg-yellow-500",
          "bg-emerald-500",
          "bg-emerald-400",
        ];
        const texts = [
          "Enter at least 6 characters",
          "Weak",
          "Fair",
          "Good",
          "Strong",
        ];

        strengths.forEach((bar, i) => {
          bar.className = `password-strength flex-1 ${i < score ? colors[score] : "bg-slate-700"}`;
        });
        strengthText.textContent = texts[score];
        strengthText.className = `text-sm mt-3 ${score <= 1 ? "text-rose-400" : score === 2 ? "text-yellow-400" : "text-emerald-400"}`;
      });

      // Confirm password match
      document
        .getElementById("confirmPassword")
        .addEventListener("input", (e) => {
          const password = document.getElementById("password").value;
          const matchError = document.getElementById("matchError");
          if (e.target.value && e.target.value !== password) {
            matchError.classList.remove("hidden");
          } else {
            matchError.classList.add("hidden");
          }
        });

      function setLoading(loading) {
        submitBtn.disabled = loading;
        if (loading) {
          btnText.textContent = "Resetting...";
          btnIcon.classList.add("hidden");
          loadingIcon.classList.remove("hidden");
        } else {
          btnText.textContent = "Reset Password";
          btnIcon.classList.remove("hidden");
          loadingIcon.classList.add("hidden");
        }
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove("hidden");
      }

      function hideError() {
        errorMessage.classList.add("hidden");
      }

      // Single form submit handler
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (password.length < 6) {
          showError("Password must be at least 6 characters");
          return;
        }

        if (password !== confirmPassword) {
          showError("Passwords do not match");
          return;
        }

        setLoading(true);

        try {
          const res = await fetch(`/auth/reset-password/${token}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to reset password");
          }

          form.classList.add("hidden");
          successMessage.classList.remove("hidden");
        } catch (err) {
          showError(err.message || "Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
