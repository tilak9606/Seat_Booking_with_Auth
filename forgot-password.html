<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .input-field {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
      }

      .btn-primary {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
      }

      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div class="w-full max-w-md">
      <!-- Logo/Header -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-emerald-500/20 border border-emerald-500/30 mb-4"
        >
          <svg
            class="w-12 h-12 text-emerald-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"
            />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-4">Forgot Password?</h1>
        <p class="text-slate-400 text-base">
          Enter your email and we'll send you a reset link
        </p>
      </div>

      <!-- Form -->
      <div class="glass-panel rounded-2xl p-8 shadow-2xl">
        <form id="forgotForm" class="space-y-6">
          <div>
            <label class="block text-base font-medium text-slate-300 mb-4"
              >Email Address</label
            >
            <div class="relative">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"
              >
                <svg
                  class="w-6 h-6 text-slate-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                  />
                </svg>
              </div>
              <input
                type="email"
                id="email"
                name="email"
                required
                class="input-field w-full pl-14 pr-4 py-4 rounded-xl text-white placeholder-slate-500 text-base"
                placeholder="you@example.com"
              />
            </div>
          </div>

          <button
            type="submit"
            id="submitBtn"
            class="btn-primary w-full py-4 rounded-xl font-semibold text-white flex items-center justify-center gap-2"
          >
            <span id="btnText" class="text-base">Send Reset Link</span>
            <svg
              id="btnIcon"
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14 5l7 7m0 0l-7 7m7-7H3"
              />
            </svg>
            <svg
              id="loadingIcon"
              class="w-5 h-5 animate-spin hidden"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
          </button>
        </form>

        <!-- Success Message -->
        <div id="successMessage" class="hidden text-center py-8">
          <div
            class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4"
          >
            <svg
              class="w-8 h-8 text-emerald-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
          </div>
          <h3 class="text-2xl font-semibold text-white mb-2">Email Sent!</h3>
          <p class="text-base text-slate-400 mb-6">
            Check your inbox for the password reset link
          </p>
          <a
            href="/login.html"
            class="text-emerald-400 hover:text-emerald-300 font-medium text-base"
          >
            Back to Login
          </a>
        </div>

        <!-- Error Message -->
        <div
          id="errorMessage"
          class="hidden mt-4 p-4 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm"
        ></div>
      </div>

      <!-- Back to Login -->
      <p class="text-center mt-6 text-base text-slate-400">
        Remember your password?
        <a
          href="/login.html"
          class="text-emerald-400 hover:text-emerald-300 text-base font-medium ml-1"
          >Sign in</a
        >
      </p>
    </div>

    <script>
      const form = document.getElementById("forgotForm");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const btnIcon = document.getElementById("btnIcon");
      const loadingIcon = document.getElementById("loadingIcon");
      const successMessage = document.getElementById("successMessage");
      const errorMessage = document.getElementById("errorMessage");

      function setLoading(loading) {
        submitBtn.disabled = loading;
        if (loading) {
          btnText.textContent = "Sending...";
          btnIcon.classList.add("hidden");
          loadingIcon.classList.remove("hidden");
        } else {
          btnText.textContent = "Send Reset Link";
          btnIcon.classList.remove("hidden");
          loadingIcon.classList.add("hidden");
        }
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove("hidden");
      }

      function hideError() {
        errorMessage.classList.add("hidden");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();

        const email = document.getElementById("email").value.trim();

        if (!email) {
          showError("Please enter your email address");
          return;
        }

        setLoading(true);

        try {
          const res = await fetch("/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to send reset email");
          }

          // Show success
          form.classList.add("hidden");
          successMessage.classList.remove("hidden");
        } catch (err) {
          showError(err.message || "Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
